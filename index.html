<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    .hero {
      padding: 100px 20px;
    }

    h1 {
      font-size: 3em;
    }

    p {
      color: #aaa;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: linear-gradient(90deg, #00f0ff, #7a00ff);
      border-radius: 8px;
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>My Website</h1>
    <p>Clean. Fast. Modern.</p>
    <a class="btn" href="#">Get Started</a>
  </div>

</body>
</html>
